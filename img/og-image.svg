<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">TIOM</title>
  <desc id="desc">TIOM IT-support och teknikhjälp i Linköping med omnejd</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eaf2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ff6700"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="180" fill="#dbeafe" opacity="0.55"/>
  <circle cx="150" cy="520" r="220" fill="#c7d2fe" opacity="0.22"/>
  <rect x="90" y="90" width="1020" height="450" rx="40" fill="#ffffff" filter="url(#shadow)"/>
  <text x="150" y="290" font-family="Arial, Helvetica, sans-serif" font-size="150" font-weight="700" letter-spacing="18" fill="#000000">TI</text>
  <text x="385" y="290" font-family="Arial, Helvetica, sans-serif" font-size="150" font-weight="700" letter-spacing="18" fill="url(#accent)">O</text>
  <text x="510" y="290" font-family="Arial, Helvetica, sans-serif" font-size="150" font-weight="700" letter-spacing="18" fill="#000000">M</text>
  <text x="150" y="390" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="600" fill="#475569">IT-support och teknikhjälp i Linköping med omnejd</text>
  <text x="150" y="450" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#64748b">Personlig hjälp hemma hos dig för datorer, Wi-Fi, skrivare och annan teknik</text>
</svg>
